<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Synchronisica</title>
	<style>
		body {
			font-family: system-ui, sans-serif;
			display: grid;
			place-items: center;
			min-height: 100vh;
			margin: 0;
			color: #e2e8f0;
			background: #0f172a;
		}
		.stage {
			position: relative;
			display: inline-block;
			line-height: 0;
			border-radius: 18px;
			overflow: hidden;
			box-shadow: 0 20px 60px rgba(0, 0, 0, .55);
		}
		.stage img {
			display: block;
			max-width: min(92vw, 1200px);
			max-height: 88vh;
			width: auto;
			height: auto;
		}
		.stage .card {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			line-height: normal;
		}
		.card {
			padding: 2.5rem 3rem;
			background: rgba(30, 41, 59, .55);
			border: 1px solid rgba(148, 163, 184, .18);
			border-radius: 12px;
			text-align: center;
			backdrop-filter: blur(14px) saturate(140%);
			-webkit-backdrop-filter: blur(14px) saturate(140%);
		}
		h1 { margin: 0 0 .5rem; font-size: 1.75rem; }
		p { margin: .25rem 0; color: #cbd5e1; }
		.ok { color: #4ade80; font-weight: 600; }
		a { color: inherit; }
	</style>
</head>
<body>
	<div class="stage">
		<img src="bg.jpg" alt="">
		<div class="card">
			<h1>Synchronisica</h1>
			<p class="ok"><a href="https://t.me/Synchronisica" target="_blank" rel="noopener">https://t.me/Synchronisica</a></p>
			<p>www.tgrbservice.ru</p>
		</div>
	</div>
</body>
</html>
